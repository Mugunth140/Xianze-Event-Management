# Root-level Docker Compose for XIANZE Event Management System
# This file orchestrates both frontend and backend services

services:
  # =============================================================================
  # BACKEND SERVICE (NestJS + SQLite)
  # =============================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xianze-backend
    restart: unless-stopped
    ports:
      - '${BACKEND_PORT:-5000}:5000'
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=5000
      - DATABASE_PATH=/data/xianze.db
    volumes:
      - sqlite-data:/data
    networks:
      - xianze-network
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:5000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =============================================================================
  # FRONTEND SERVICE (Next.js)
  # =============================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:5000}
    container_name: xianze-frontend
    restart: unless-stopped
    ports:
      - '${FRONTEND_PORT:-3000}:3000'
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:5000}
    networks:
      - xianze-network
    depends_on:
      backend:
        condition: service_healthy

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  xianze-network:
    driver: bridge
    name: xianze-network

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  sqlite-data:
    name: xianze-sqlite-data
