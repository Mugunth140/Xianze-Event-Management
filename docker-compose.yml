# XIANZE Event Management - Development Docker Compose
# For development, run frontend locally with `bun run dev`

services:
  redis:
    image: redis:7-alpine
    container_name: xianze-redis-dev
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    networks:
      - xianze-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xianze-backend-dev
    restart: unless-stopped
    ports:
      - '${BACKEND_PORT:-5000}:5000'
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DATABASE_PATH=/data/xianze.db
      - DATABASE_SYNCHRONIZE=true
      - DATABASE_LOGGING=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CORS_ORIGIN=http://localhost:3000
    volumes:
      - sqlite-data:/data
    networks:
      - xianze-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  xianze-network:
    driver: bridge
    name: xianze-dev-network

volumes:
  sqlite-data:
    name: xianze-dev-sqlite
  redis-data:
    name: xianze-dev-redis
