# XIANZE Event Management - Docker Compose
# Services: Frontend (Next.js), Backend (NestJS), Redis (Cache)

services:
  redis:
    image: redis:7-alpine
    container_name: xianze-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - xianze-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xianze-backend
    restart: unless-stopped
    ports:
      - '${BACKEND_PORT:-5000}:5000'
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=5000
      - DATABASE_PATH=/data/xianze.db
      - DATABASE_SYNCHRONIZE=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - sqlite-data:/data
    networks:
      - xianze-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:5000}
    container_name: xianze-frontend
    restart: unless-stopped
    ports:
      - '${FRONTEND_PORT:-3000}:3000'
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:5000}
    networks:
      - xianze-network
    depends_on:
      backend:
        condition: service_healthy

networks:
  xianze-network:
    driver: bridge
    name: xianze-network

volumes:
  sqlite-data:
    name: xianze-sqlite-data
  redis-data:
    name: xianze-redis-data
