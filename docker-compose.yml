# XIANZE Event Management - Development Docker Compose
# For development, run frontend locally with `bun run dev`

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xianze-backend-dev
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - DATABASE_PATH=/data/xianze.db
    volumes:
      - sqlite-data:/data
      - ./uploads:/data/transactions
    networks:
      - xianze-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  xianze-network:
    driver: bridge
    name: xianze-dev-network

volumes:
  sqlite-data:
    name: xianze-dev-sqlite
