# XIANZE Production - Nginx serves static frontend + proxies API
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  # Build frontend static files
  frontend-builder:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_WHATSAPP_URL=${NEXT_PUBLIC_WHATSAPP_URL}
    container_name: xianze-frontend-builder
    volumes:
      - frontend-static:/app/out-static
    command:
      ["/bin/sh", "-c", "rm -rf /app/out-static/* && cp -r /app/out/. /app/out-static/"]

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: xianze-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - frontend-static:/usr/share/nginx/html:ro
      - ./nginx/nginx.ssl.conf:/etc/nginx/nginx.conf:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    networks:
      - xianze-network
    depends_on:
      frontend-builder:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xianze-backend
    restart: unless-stopped
    expose:
      - "5000"
      - "5001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - WS_PORT=5001
      - DATABASE_PATH=/data/xianze.db
      - DATABASE_SYNCHRONIZE=false
      - DATABASE_LOGGING=false
      - CORS_ORIGIN=${CORS_ORIGIN:-https://xianze.tech}
      # Mail configuration - MUST use Docker service name, not localhost
      - MAIL_HOST=mailserver
      - MAIL_PORT=587
    volumes:
      - sqlite-data:/data
    networks:
      - xianze-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  # SSL Manager - handles certificate renewal AND nginx reload in one container
  ssl-manager:
    image: certbot/certbot:latest
    container_name: xianze-ssl-manager
    restart: unless-stopped
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - xianze-network
    entrypoint: >
      /bin/sh -c '
        apk add --no-cache docker-cli curl;
        while true; do
          echo "[$(date)] Checking certificate renewal...";
          certbot renew --webroot -w /var/www/certbot --quiet;
          if [ $? -eq 0 ]; then
            echo "[$(date)] Reloading nginx...";
            docker exec xianze-nginx nginx -s reload 2>/dev/null || true;
          fi;
          sleep 12h;
        done
      '
    depends_on:
      - nginx
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: xianze-mailserver
    hostname: mail
    domainname: xianze.tech
    ports:
      - "25:25"
      - "143:143"
      - "587:587"
      - "993:993"
    volumes:
      - mail-data:/var/mail
      - mail-state:/var/mail-state
      - mail-logs:/var/log/mail
      - mail-config:/tmp/docker-mailserver
      - certbot-conf:/etc/letsencrypt:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - ENABLE_SPAMASSASSIN=0
      - ENABLE_CLAMAV=0
      - ENABLE_FAIL2BAN=1
      - ENABLE_POSTGREY=0
      - SSL_TYPE=letsencrypt
      - SPOOF_PROTECTION=1
      - PERMIT_DOCKER=network
    cap_add:
      - NET_ADMIN
    restart: always
    networks:
      - xianze-network
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2G

networks:
  xianze-network:
    driver: bridge
    name: xianze-prod-network

volumes:
  frontend-static:
    name: xianze-frontend-static
  sqlite-data:
    name: xianze-prod-sqlite
  certbot-conf:
    name: xianze-certbot-conf
  certbot-www:
    name: xianze-certbot-www
  mail-data:
    name: xianze-mail-data
  mail-state:
    name: xianze-mail-state
  mail-logs:
    name: xianze-mail-logs
  mail-config:
    name: xianze-mail-config
