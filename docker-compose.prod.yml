# XIANZE Production - Nginx serves static frontend + proxies API
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  # Build frontend static files
  frontend-builder:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/api
    container_name: xianze-frontend-builder
    volumes:
      - frontend-static:/app/out
    command: ["echo", "Build complete"]

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: xianze-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - frontend-static:/usr/share/nginx/html:ro
      - ./nginx/nginx.ssl.conf:/etc/nginx/nginx.conf:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    networks:
      - xianze-network
    depends_on:
      frontend-builder:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  redis:
    image: redis:7-alpine
    container_name: xianze-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - xianze-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xianze-backend
    restart: unless-stopped
    expose:
      - '5000'
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_PATH=/data/xianze.db
      - DATABASE_SYNCHRONIZE=false
      - DATABASE_LOGGING=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CORS_ORIGIN=${CORS_ORIGIN:-https://xianze.tech}
      - RATE_LIMIT_TTL=${RATE_LIMIT_TTL:-60}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-100}
    volumes:
      - sqlite-data:/data
    networks:
      - xianze-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # Certbot for SSL certificate auto-renewal (every 12 hours)
  certbot:
    image: certbot/certbot:latest
    container_name: xianze-certbot
    restart: unless-stopped
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    networks:
      - xianze-network
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do echo \"[$(date)] Checking certificate renewal...\"; certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;'"
    depends_on:
      - nginx

  # Nginx reloader - monitors certificate changes and reloads nginx
  nginx-reloader:
    image: alpine:latest
    container_name: xianze-nginx-reloader
    restart: unless-stopped
    volumes:
      - certbot-conf:/etc/letsencrypt:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    entrypoint: "/bin/sh -c 'apk add --no-cache inotify-tools docker-cli && while inotifywait -e modify -e create /etc/letsencrypt/live/; do echo \"[$(date)] Certificate changed, reloading nginx...\"; docker exec xianze-nginx nginx -s reload 2>/dev/null || true; done;'"
    depends_on:
      - nginx
      - certbot

networks:
  xianze-network:
    driver: bridge
    name: xianze-prod-network

volumes:
  frontend-static:
    name: xianze-frontend-static
  sqlite-data:
    name: xianze-prod-sqlite
  redis-data:
    name: xianze-prod-redis
  certbot-conf:
    name: xianze-certbot-conf
  certbot-www:
    name: xianze-certbot-www
