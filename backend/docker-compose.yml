# XIANZE Backend - Standalone Docker Compose
# Use this for developing the backend in isolation

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xianze-backend-dev
    restart: unless-stopped
    ports:
      - '${PORT:-5000}:5000'
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=5000
      - DATABASE_PATH=/data/xianze.db
      - DATABASE_LOGGING=${DATABASE_LOGGING:-true}
      - DATABASE_SYNCHRONIZE=${DATABASE_SYNCHRONIZE:-true}
    volumes:
      - sqlite-data:/data
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:5000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  sqlite-data:
    name: xianze-backend-sqlite-data
